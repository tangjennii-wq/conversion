.check-text{font-size:14px;line-height:1.5;flex:1}
.check-text.done{text-decoration:line-through;color:#999}

.cat-btn:active{transform:scale(.97)}

.chat-msgs{max-height:340px;overflow-y:auto;padding:14px}
.chat-msg{margin-bottom:10px;display:flex}
.chat-msg.user{justify-content:flex-end}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.chat-bubble.user{background:#4caf50;color:#fff;border-bottom-right-radius:4px}
.chat-bubble.bot{background:#f0f0f0;color:#1a1a2e;border-bottom-left-radius:4px}

.survey-q textarea:focus,.survey-q input:focus{border-color:#4caf50}
.tab-row{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab-btn{border:none;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.active{background:#1a1a2e;color:#fff}

.speak-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;transition:all .15s}
.speak-btn:active{background:#e8f5e9}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

  h+='<p style="font-size:13px;color:#888;margin-bottom:14px">'+done+'/'+CONVERSION_TASKS.length+' completed — from rB\'s checklist</p>';

  h+='<div class="card">';
  CONVERSION_TASKS.forEach(function(t){
    var d=S.tasksDone[t.id];
    h+='<div class="checklist-item" data-task="'+t.id+'">';
    h+='<div class="check-box '+(d?"done":"")+'">'+( d?"✓":"")+'</div>';
    h+='<div class="check-text '+(d?"done":"")+'">'+esc(t.text)+'</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="card" style="margin-top:8px">';
  h+='<h3 style="margin-bottom:8px">📅 Key Links</h3>';
  h+='<div style="font-size:13px;line-height:2"><a href="https://darshanyeshiva.org/courses/the-conversion-to-judaism-program/" target="_blank" style="color:#4caf50">Darshan Yeshiva Course →</a><br>';
  h+='<a href="https://calendly.com/rabbi_brian/" target="_blank" style="color:#4caf50">Schedule with rB (Calendly) →</a></div>';
  h+='</div>';

  return h;
}

function renderChat(){
  var h='<h2 style="margin-bottom:14px">Hebrew & Judaism Tutor</h2>';
  h+='<div class="chat-box">';
  h+='<div class="chat-msgs" id="chatMsgs">';
  if(S.chatMsgs.length===0){
    h+='<div style="text-align:center;padding:30px 16px;color:#aaa;font-size:13px;line-height:1.6">Ask me anything about Judaism, Hebrew, holidays, prayers, conversion, or your studies. I\'m here to help — no question is too basic! 🕊️</div>';
  }
  S.chatMsgs.forEach(function(m){
    h+='<div class="chat-msg '+(m.r==="u"?"user":"")+'"><div class="chat-bubble '+(m.r==="u"?"user":"bot")+'">'+esc(m.t).replace(/\n/g,"<br>")+'</div></div>';
  });
  if(S.chatBusy)h+='<div class="chat-msg"><div class="chat-bubble bot" style="font-style:italic;color:#999">Thinking...</div></div>';
  h+='</div>';
  h+='<div class="chat-input-row"><input class="chat-input" id="chatIn" value="'+esc(S.chatIn)+'" placeholder="e.g. What is Shabbat? How do I say thank you?"><button class="chat-send" id="chatSend" style="background:'+(S.chatIn.trim()?"#4caf50":"#ccc")+';cursor:'+(S.chatIn.trim()?"pointer":"default")+'">→</button></div>';
  h+='</div>';

  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
  ["What is Shabbat?","How do I say the Shema?","Explain Tikkun Olam","What happens at a Beit Din?","Tell me about Passover"].forEach(function(q){
    h+='<button class="tag" data-quickq="'+esc(q)+'" style="background:#e8f5e9;color:#2e7d32;cursor:pointer;border:none;font-family:inherit">'+q+'</button>';
  });
  h+='</div>';
  return h;
}

// ═══════════════ HELPERS ═══════════════
function getAllCards(){
  var cards=[];
  EVERYDAY.forEach(function(p){cards.push(p)});
  VOCAB.forEach(function(v){cards.push(v)});
  HOLIDAYS.forEach(function(ho){ho.phrases.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:ho.name})})});
  ALEFBET.forEach(function(a){cards.push({h:a.h,t:a.t,m:a.m,c:"Sound: "+a.v})});
  // Add prayers to flashcard pool
  PRAYERS.shabbat.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:"Shabbat: "+p.name})});
  PRAYERS.conversion.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:"Conversion: "+p.name})});
  // Add content from completed course modules
  Object.keys(COURSE_CONTENT).forEach(function(moduleName){
    var key="dy_"+moduleName.replace(/\W/g,"_");
    if(S.dyProgress[key]){
      COURSE_CONTENT[moduleName].forEach(function(item){cards.push(item)});
    }
  });
  return cards;
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp}
  return arr;
}

function generateReport(){
  var lines=["SURVEY REPORT — Judaism Perspectives from Friends","Prepared for: Rabbi Brian","By: Jenni Tang","Date: "+new Date().toLocaleDateString(),"","═══════════════════════════════════════",""];
  for(var fi=1;fi<=5;fi++){
    var fk="friend_"+fi;
    var name=S.surveyData[fk+"_name"];
    if(!name)continue;
    lines.push("FRIEND: "+name);
    lines.push("─────────────────────────────");
    lines.push("Q1 — How much Hebrew should I know?");
    lines.push("  "+(S.surveyData[fk+"_hebrew"]||"(no answer)"));
    lines.push("");
    lines.push("Q2 — 3 things it takes to become Jewish:");
    lines.push("  "+(S.surveyData[fk+"_three"]||"(no answer)"));
    lines.push("");
    lines.push("Q3 — What should I know/do?");
    lines.push("  "+(S.surveyData[fk+"_advice"]||"(no answer)"));
    lines.push("","");
  }
  lines.push("═══════════════════════════════════════");
  lines.push("END OF REPORT");
  var blob=new Blob([lines.join("\n")],{type:"text/plain"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Survey_Report_for_rB_"+new Date().toISOString().slice(0,10)+".txt";
  a.click();
}

async function sendChat(){
  if(!S.chatIn.trim()||S.chatBusy)return;
  var key=getKey();if(!key)return;
  var msg=S.chatIn.trim();S.chatIn="";S.chatBusy=true;
  S.chatMsgs.push({r:"u",t:msg});render();
  try{
    var sys="You are a warm, patient, knowledgeable tutor helping a complete beginner learn Hebrew and Judaism for conversion (Reform tradition, Sephardic/Modern Israeli pronunciation). The student's name is Jenni. She is converting and studying with Rabbi Brian. Use transliteration alongside Hebrew script whenever you write Hebrew. Keep answers clear, concise, and encouraging. If she asks about prayers, include the Hebrew, transliteration, AND translation. Assume zero prior knowledge. Be encouraging and celebrate progress. If she asks about something you're not sure about, say so honestly.";
    var msgs=S.chatMsgs.map(function(m){return{role:m.r==="u"?"user":"assistant",content:m.t}});
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:msgs})
    });
    if(!res.ok){var e=await res.text();throw new Error(res.status+": "+e.slice(0,200))}
    var data=await res.json();
    var reply=data.content.map(function(b){return b.text||""}).join("");
    S.chatMsgs.push({r:"a",t:reply});
  }catch(e){
    S.chatMsgs.push({r:"a",t:"Error: "+e.message});
    if(e.message.indexOf("401")>-1)localStorage.removeItem("anthropic_key");
  }
  S.chatBusy=false;render();
  setTimeout(function(){var el=document.getElementById("chatMsgs");if(el)el.scrollTop=el.scrollHeight},50);
}

// ═══════════════ EVENTS ═══════════════
function bindEvents(){
  // Nav
  document.querySelectorAll("#nav button").forEach(function(b){b.onclick=function(){S.page=b.dataset.pg;S.subpage=null;S.flipped=false;render()}});

  // Home quick links
  document.querySelectorAll("[data-go]").forEach(function(b){b.onclick=function(){S.page=b.dataset.go;render()}});

  // Learn categories
  document.querySelectorAll("[data-sub]").forEach(function(b){b.onclick=function(){S.subpage=b.dataset.sub;render()}});

  // Back button
  document.querySelectorAll("[data-back]").forEach(function(b){b.onclick=function(){S.subpage=null;render()}});

  // Holiday tabs
  document.querySelectorAll("[data-hidx]").forEach(function(b){b.onclick=function(){S.holidayIdx=parseInt(b.dataset.hidx);render()}});

  // Speak buttons
  document.querySelectorAll("[data-speak]").forEach(function(b){b.onclick=function(e){e.stopPropagation();speak(b.dataset.speak)}});

  // Flashcard
  var fc=document.getElementById("flashcard");
  if(fc)fc.onclick=function(){S.flipped=!S.flipped;render()};
  var fn=document.getElementById("flashNext");
  if(fn)fn.onclick=function(){S.flashIdx++;S.flipped=false;render()};
  var fp=document.getElementById("flashPrev");
  if(fp)fp.onclick=function(){if(S.flashIdx>0)S.flashIdx--;S.flipped=false;render()};

  // Tasks
  document.querySelectorAll("[data-task]").forEach(function(b){b.onclick=function(){var id=b.dataset.task;S.tasksDone[id]=!S.tasksDone[id];saveState();render()}});

  // DY course items
  document.querySelectorAll("[data-dy]").forEach(function(b){b.onclick=function(){var key=b.dataset.dy;S.dyProgress[key]=!S.dyProgress[key];S.flashPool=null;saveState();render()}});

  // Chat
  var ci=document.getElementById("chatIn");
  if(ci){
    ci.oninput=function(e){
      S.chatIn=e.target.value;
      var sb=document.getElementById("chatSend");
      if(sb){sb.style.background=S.chatIn.trim()?"#4caf50":"#ccc";sb.style.cursor=S.chatIn.trim()?"pointer":"default"}
    };
    ci.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();sendChat()}};
    ci.focus();
  }
  var cs=document.getElementById("chatSend");if(cs)cs.onclick=sendChat;

  // Quick questions
  document.querySelectorAll("[data-quickq]").forEach(function(b){b.onclick=function(){S.chatIn=b.dataset.quickq;render();setTimeout(sendChat,100)}});

  // Media tabs
  document.querySelectorAll("[data-mtab]").forEach(function(b){b.onclick=function(){S.mediaTab=b.dataset.mtab;render()}});

  // Media progress
  document.querySelectorAll("[data-media]").forEach(function(b){b.onclick=function(){var key=b.dataset.media;if(!S.mediaProgress)S.mediaProgress={};S.mediaProgress[key]=!S.mediaProgress[key];saveState();render()}});

  // Survey inputs
  document.querySelectorAll("[data-sv]").forEach(function(el){
    el.oninput=function(e){S.surveyData[el.dataset.sv]=e.target.value;saveState()};
  });

  // Generate report
  var gr=document.getElementById("genReport");if(gr)gr.onclick=generateReport;
}

// ═══════════════ INIT ═══════════════
render();
</script>
