.check-text{font-size:14px;line-height:1.5;flex:1}
.check-text.done{text-decoration:line-through;color:#999}

.cat-btn:active{transform:scale(.97)}

.chat-msgs{max-height:340px;overflow-y:auto;padding:14px}
.chat-msg{margin-bottom:10px;display:flex}
.chat-msg.user{justify-content:flex-end}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.chat-bubble.user{background:#4caf50;color:#fff;border-bottom-right-radius:4px}
.chat-bubble.bot{background:#f0f0f0;color:#1a1a2e;border-bottom-left-radius:4px}

.survey-q textarea:focus,.survey-q input:focus{border-color:#4caf50}
.tab-row{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab-btn{border:none;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.active{background:#1a1a2e;color:#fff}

.speak-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;transition:all .15s}
.speak-btn:active{background:#e8f5e9}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

var COURSE_LESSONS = {
  "The Jewish Calendar":"The Jewish calendar is lunisolar — months follow the moon (29-30 days each), but a leap month is added 7 times in every 19-year cycle to stay aligned with the seasons. This matters because holidays are tied to both lunar dates and agricultural seasons.\n\nThere are 12 months (13 in a leap year): Tishrei, Cheshvan, Kislev, Tevet, Shevat, Adar, Nisan, Iyar, Sivan, Tammuz, Av, Elul. The year starts in Tishrei (fall), but Nisan (spring) is considered the first month in the Torah.\n\nPractical takeaway: Jewish holidays 'move around' on the secular calendar because of this lunar system. Rosh Hashanah is always 1 Tishrei, but that could be anywhere from early September to early October. You'll get used to checking a Jewish calendar — your siddur or My Jewish Learning has one.",
  "Shabbat & Havdallah":"Shabbat is the weekly day of rest, from Friday at sunset to Saturday after dark (when three stars appear). It's arguably the most important Jewish practice — more central than any holiday.\n\nFriday evening: Light candles (before sunset), say Kiddush over wine, bless challah (HaMotzi). These are the three blessings you're learning from rB's prayer sheets.\n\nSaturday: Attend services (optional but meaningful), rest, enjoy meals, study Torah, spend time with family. Avoid 'work' — traditionally this means 39 categories of creative labor, but Reform Judaism interprets this more flexibly.\n\nHavdalah: Saturday night ceremony marking the end of Shabbat. Uses three sensory items — wine (taste), braided candle (sight), spices/besamim (smell). You say 'Shavua Tov!' (good week) afterward.\n\nThe key idea: Shabbat is a gift, not a burden. It's 25 hours to stop producing and just be.",
  "Fall Holidays":"The Jewish year's biggest holidays cluster in Tishrei (September-October). They're called the Yamim Noraim (Days of Awe) and the pilgrimage festivals.\n\nRosh Hashanah (1-2 Tishrei): Jewish New Year. Themes: renewal, reflection, God as sovereign. You eat apples dipped in honey for a sweet year, hear the shofar (ram's horn), and say 'Shanah Tovah.' The Book of Life is opened.\n\nYom Kippur (10 Tishrei): Day of Atonement. The holiest day. 25-hour fast, no leather shoes, white clothing. Theme: genuine repentance (teshuvah). The Book of Life is sealed. You say 'G'mar Chatimah Tovah.'\n\nSukkot (15-21 Tishrei): Festival of Booths. You build a temporary hut (sukkah) and eat in it for 7 days — reminding you of Israelite wandering and the fragility of life. Wave the lulav and etrog.\n\nSimchat Torah: Celebrates completing the annual Torah reading cycle and immediately starting over. Dancing with Torah scrolls — joyful and wild.",
  "Winter Holidays":"Hanukkah (25 Kislev, 8 nights): NOT 'Jewish Christmas.' Celebrates the Maccabees' victory and the miracle of oil lasting 8 nights. Light the chanukiah (9-branch menorah) — one candle per night plus the shamash. Eat fried foods (latkes, sufganiyot). Play dreidel.\n\nTu BiShvat (15 Shevat): New Year of the Trees. A minor holiday — eat fruits associated with Israel (dates, figs, pomegranates, olives, grapes). You celebrated this one already with your arrangement!\n\nPurim (14 Adar): Read the Megillah (Book of Esther), dress in costumes, give food gifts (mishloach manot), eat hamantaschen, and get joyfully drunk (yes, really — 'ad d'lo yada'). You went to Purim at Makom and the Renewalniks!",
  "Spring & Summer Holidays":"Passover/Pesach (15-22 Nisan): Commemorates the Exodus from Egypt. The Seder is the big event — you follow the Haggadah through 15 steps, eat matzah, bitter herbs, charoset, and ask the Four Questions. No chametz (leavened bread) for 8 days. You hosted a Seder with Veronica!\n\nYom HaShoah (27 Nisan): Holocaust Remembrance Day. Ceremonies, candle lighting, survivor testimonies. You visited the memorial in Toronto.\n\nYom Ha'atzmaut (5 Iyar): Israeli Independence Day.\n\nShavuot (6-7 Sivan): Celebrates receiving the Torah at Mount Sinai. Traditions: stay up all night studying Torah (Tikkun Leil Shavuot), eat dairy foods (cheesecake!), read the Book of Ruth — the original conversion story.\n\nTisha B'Av (9 Av): Saddest day — commemorates the destruction of both Temples. Fasting, reading Lamentations.",
  "The Jewish Lifecycle + Birth & Baby Naming":"Birth: For boys, brit milah (circumcision) on day 8 — one of Judaism's oldest rituals, going back to Abraham. The baby receives a Hebrew name. For girls, a simchat bat (naming ceremony). Both welcome the child into the covenant.\n\nPidyon HaBen: 'Redemption of the firstborn' — a ceremony for firstborn sons on day 31.\n\nYour Hebrew name as a convert will be '[your name] bat Avraham v'Sarah' — daughter of Abraham and Sarah, the spiritual parents of all converts.",
  "Marriage and Divorce":"Jewish weddings have beautiful rituals: the ketubah (marriage contract) is signed, the couple stands under the chuppah (canopy symbolizing their new home), seven blessings are chanted, wine is shared, and the groom breaks a glass — everyone shouts 'Mazel Tov!'\n\nThe breaking glass recalls the destruction of the Temple — even in joy, we remember sorrow.\n\nDivorce: Requires a get (religious divorce document) in addition to a civil divorce. In Reform Judaism, the civil divorce is generally considered sufficient, but many still do a get for closure.",
  "Life, Death and Mourning":"Judaism has a structured, compassionate approach to death and grief.\n\nDeath: The body is washed (tahara), dressed in simple white shrouds (tachrichim), and buried quickly (ideally within 24 hours). The casket is plain wood — everyone is equal in death.\n\nShiva: 7 days of mourning at home. Mirrors are covered, mourners sit on low chairs, visitors bring food and comfort. You say 'HaMakom y'nachem etchem' to mourners.\n\nShloshim: 30-day period of reduced mourning. Kaddish is recited daily for 11 months for a parent.\n\nYahrzeit: Annual anniversary of death — light a memorial candle, say Kaddish.\n\nThe goal: Mourning is not suppressed but structured. Judaism says: grieve deeply, then gradually re-enter life.",
  "Tzedakah":"Tzedakah is NOT charity — it's justice. The Hebrew root is 'tzedek' (justice/righteousness). Giving is an obligation, not optional generosity.\n\nMaimonides' 8 levels of tzedakah (from lowest to highest): 1) Giving reluctantly. 2) Giving less than appropriate, cheerfully. 3) Giving after being asked. 4) Giving before being asked. 5) Giving anonymously to known recipient. 6) Giving to unknown recipient. 7) Both parties anonymous. 8) Helping someone become self-sufficient.\n\nPractical: Many Jewish families keep a tzedakah box (pushke) and drop coins in before Shabbat candle lighting. The standard is to give 10% of income (ma'aser).",
  "Mezuzah":"A mezuzah is a small case containing a parchment (klaf) with two passages from the Torah — the Shema (Deuteronomy 6:4-9 and 11:13-21). It's affixed to the doorframes of Jewish homes.\n\nPlacement: Right side of the doorframe as you enter, in the upper third, tilted inward (Ashkenazi custom) or vertical (Sephardi custom). It goes on every doorway except bathrooms.\n\nWhen you pass through a door, you can touch the mezuzah and kiss your fingers — a reminder of God's presence and the values of your home.\n\nYou'll put up mezuzot (plural) after your conversion — it's one of the most tangible, daily ways to mark a Jewish home.",
  "Torah: the Five Books of Moses":"The Torah is the foundation. Five books: Bereishit (Genesis), Shemot (Exodus), Vayikra (Leviticus), Bamidbar (Numbers), Devarim (Deuteronomy).\n\nIt's read aloud in synagogue every Shabbat — the full cycle takes one year. Each week's portion is called a parashah.\n\nJews don't read the Torah literally like a history textbook. It's interpreted through layers: peshat (plain meaning), remez (hints), drash (interpretation), and sod (mystical/hidden meaning). This is called PaRDeS.\n\nThe Torah scroll is handwritten by a sofer (scribe) on parchment — it takes about a year to write one, and a single error can invalidate it. When it's carried around the synagogue, people reach out to touch it with their tallit or siddur and kiss it.",
  "Talmud":"The Talmud is the record of centuries of rabbinic discussion about how to live a Jewish life. It's made of two parts: Mishnah (oral law, compiled ~200 CE) + Gemara (commentary on the Mishnah, completed ~500 CE).\n\nIt's not a rule book — it's a conversation. Rabbis argue, disagree, tell stories, crack jokes, and explore edge cases. Minority opinions are preserved alongside majority ones because 'both are the words of the living God.'\n\nYou studied Talmud Berakhot 60a at Makom! That tractate is about blessings — fitting for where you are in your journey.\n\nDaf Yomi: A global practice where people study one page (daf) of Talmud per day, completing the entire Talmud in about 7.5 years. Michelle Cohen Farber's podcast 'Daf Yomi for Women' is on your media list.",
  "Why Hebrew Matters & The Alef Bet":"Hebrew connects you to 3,000 years of Jewish thought, prayer, and culture. Even knowing a little transforms your experience in synagogue.\n\nThe alef-bet has 22 letters, all consonants. Vowels are shown as dots and dashes (nikkud) above and below letters — but in modern Israeli Hebrew, these are usually omitted (you just learn the vowel patterns).\n\nYou read right to left. Five letters have special forms when they appear at the end of a word (sofit forms): kaf→ך, mem→ם, nun→ן, pe→ף, tsade→ץ.\n\nStart with: your name in Hebrew, the Shema, and the first line of common blessings (Baruch Atah Adonai...). Don't try to master reading before your conversion — rB will guide you on how much is enough.",
  "Important Blessings":"Blessings (berakhot) are the heartbeat of Jewish daily life. Most begin with the formula: Baruch Atah Adonai, Eloheinu Melech ha'olam... (Blessed are You, Lord our God, Ruler of the universe...)\n\nYour essential blessings to know:\n• Candle lighting (Shabbat) — l'hadlik ner shel Shabbat\n• Wine — borei p'ri hagafen\n• Bread — hamotzi lechem min ha'aretz\n• Shema — Sh'ma Yisrael, Adonai Eloheinu, Adonai Echad\n• Shehecheyanu — for milestones and new experiences\n• Mikveh blessing — for your conversion immersion\n\nThe idea behind berakhot: every experience is an opportunity for gratitude and awareness. There are blessings for seeing a rainbow, hearing thunder, encountering the ocean, even going to the bathroom (asher yatzar — thanking God that your body works).",
  "Introduction to Middot":"Middot are character traits that Jewish tradition asks us to cultivate. This practice is called Mussar — an ethical self-improvement tradition.\n\nKey middot include: anavah (humility), savlanut (patience), hakarat hatov (gratitude), chesed (lovingkindness), emet (truth), bitachon (trust), nedivut (generosity), menuchat hanefesh (equanimity).\n\nThe practice: Pick one middah per week. Notice when it comes up in your life. Journal about it. Mussar isn't about perfection — it's about awareness and gradual growth.\n\nAlan Morinis' book 'Everyday Holiness' is the modern classic on Mussar practice.",
  "Jewish Prayer Practice, Tallit and Tefillin":"Jewish prayer has three daily services: Shacharit (morning), Mincha (afternoon), Ma'ariv (evening). Shabbat adds Musaf (additional).\n\nTallit: A prayer shawl with tzitzit (fringes) on four corners, worn during morning prayers. The fringes are a physical reminder of the commandments (Numbers 15:38-39). In Reform Judaism, both men and women may wear a tallit.\n\nTefillin: Two small leather boxes containing Torah verses, bound to the arm and forehead during weekday morning prayers. They're a literal fulfillment of 'bind them as a sign on your hand, and they shall be as frontlets between your eyes' (Deuteronomy 6:8). Reform practice varies — some do, some don't.\n\nThe Amidah (standing prayer) is the central prayer of every service — 19 blessings on weekdays, 7 on Shabbat. Said standing, facing Jerusalem, in a quiet voice."
};

// ═══════════════ PROFILES (encrypted, local) ═══════════════
// Each profile stores its progress encrypted with a 4-digit PIN.
// Storage layout:
//   ivrit_profiles  -> JSON array of {name, salt} (salt is for key derivation)
//   ivrit_p_<name>  -> {iv, ct} encrypted blob of progress data

function b64e(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf)))}
function b64d(str){var b=atob(str);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u}
function randBytes(n){var u=new Uint8Array(n);crypto.getRandomValues(u);return u}

function deriveKey(pin,saltB64){
  var salt=b64d(saltB64);
  return crypto.subtle.importKey("raw",new TextEncoder().encode(pin),{name:"PBKDF2"},false,["deriveKey"])
    .then(function(km){
      return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
    });
}

function encryptProgress(key,obj){
  var iv=randBytes(12);
  var data=new TextEncoder().encode(JSON.stringify(obj));
  return crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,data).then(function(ct){
    return{iv:b64e(iv),ct:b64e(ct)}
  });
}

function decryptProgress(key,blob){
  return crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(blob.iv)},key,b64d(blob.ct))
    .then(function(pt){return JSON.parse(new TextDecoder().decode(pt))});
}

function getProfiles(){
  try{return JSON.parse(localStorage.getItem("ivrit_profiles")||"[]")}catch(e){return[]}
}
function saveProfiles(list){localStorage.setItem("ivrit_profiles",JSON.stringify(list))}

function profileExists(name){return getProfiles().some(function(p){return p.name===name})}

function createProfile(name,pin){
  var salt=b64e(randBytes(16));
  var list=getProfiles();
  list.push({name:name,salt:salt});
  saveProfiles(list);
  return deriveKey(pin,salt).then(function(key){
    return encryptProgress(key,{}).then(function(blob){
      localStorage.setItem("ivrit_p_"+name,JSON.stringify(blob));
      return key;
    });
  });
}

function loadProfile(name,pin){
  var p=getProfiles().find(function(x){return x.name===name});
  if(!p)return Promise.reject(new Error("no profile"));
  return deriveKey(pin,p.salt).then(function(key){
    var raw=localStorage.getItem("ivrit_p_"+name);
    if(!raw)return{key:key,data:{}};
    return decryptProgress(key,JSON.parse(raw)).then(function(data){return{key:key,data:data}});
  });
}

function deleteProfile(name){
  saveProfiles(getProfiles().filter(function(p){return p.name!==name}));
  localStorage.removeItem("ivrit_p_"+name);
}

    if(!/^\d{4}$/.test(pin)){S.profileErr="PIN must be 4 digits";render();return}
    if(pin!==pin2){S.profileErr="PINs don't match";render();return}
    if(profileExists(name)){S.profileErr="That name already exists";render();return}
    createProfile(name,pin).then(function(key){
      ACTIVE.name=name;ACTIVE.key=key;
      applyProfileData({});
      S.profileErr="";S.profileMode=null;
      render();
    });
  };

  var lb=document.getElementById("pfLogin");
  if(lb)lb.onclick=function(){
    var name=document.getElementById("pfSelect").value;
    var pin=document.getElementById("pfPin").value;
    if(!/^\d{4}$/.test(pin)){S.profileErr="PIN must be 4 digits";render();return}
    loadProfile(name,pin).then(function(res){
      ACTIVE.name=name;ACTIVE.key=res.key;
      applyProfileData(res.data);
      S.profileErr="";S.profileMode=null;
      render();
    }).catch(function(){
      S.profileErr="Wrong PIN";render();
    });
  };
}

function generateQuiz(){
  var pool=getAllCards();
  if(pool.length<4)return;
  var questions=[];
  var used={};
  var shuffled=shuffle(pool.slice());
  for(var i=0;i<shuffled.length&&questions.length<S.quizTotal;i++){
    var card=shuffled[i];
    if(used[card.t])continue;
    used[card.t]=true;
    // Build 3 wrong answers from other cards
    var wrongs=[];
    var pool2=shuffle(pool.slice());
    for(var j=0;j<pool2.length&&wrongs.length<3;j++){
      if(pool2[j].t!==card.t&&!wrongs.some(function(w){return w===pool2[j].m})){
        wrongs.push(pool2[j].m);
      }
    }
    if(wrongs.length<3)continue;
    // Random position for correct answer
    var pos=Math.floor(Math.random()*4);
    var opts=wrongs.slice();
    opts.splice(pos,0,card.m);
    // Random question type
    var types=["translit_to_meaning","hebrew_to_meaning"];
    var qtype=types[Math.floor(Math.random()*types.length)];
    questions.push({card:card,opts:opts,correct:pos,type:qtype,picked:null});
  }
  return questions;
}

function getAllCards(){
  var cards=[];
  EVERYDAY.forEach(function(p){cards.push(p)});

  HOLIDAYS.forEach(function(ho){ho.phrases.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:ho.name})})});
  // Add prayers to flashcard pool
  PRAYERS.shabbat.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:"Shabbat: "+p.name})});
  PRAYERS.conversion.forEach(function(p){cards.push({h:p.h,t:p.t,m:p.m,c:"Conversion: "+p.name})});
  // Add content from completed course modules
  Object.keys(COURSE_CONTENT).forEach(function(moduleName){

    if(S.dyProgress[key]){
      COURSE_CONTENT[moduleName].forEach(function(item){cards.push(item)});

  return cards;
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp}
  return arr;
}

      S.chatIn=e.target.value;
      var sb=document.getElementById("chatSend");
      if(sb){sb.style.background=S.chatIn.trim()?"#4caf50":"#ccc";sb.style.cursor=S.chatIn.trim()?"pointer":"default"}
    };
    ci.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();sendChat()}};
    ci.focus();
  }
  var cs=document.getElementById("chatSend");if(cs)cs.onclick=sendChat;

  // Quick questions
  document.querySelectorAll("[data-quickq]").forEach(function(b){b.onclick=function(){S.chatIn=b.dataset.quickq;render();setTimeout(sendChat,100)}});

  // Media tabs
  document.querySelectorAll("[data-mtab]").forEach(function(b){b.onclick=function(){S.mediaTab=b.dataset.mtab;render()}});

  // Media progress
  document.querySelectorAll("[data-media]").forEach(function(b){b.onclick=function(){var key=b.dataset.media;if(!S.mediaProgress)S.mediaProgress={};S.mediaProgress[key]=!S.mediaProgress[key];saveState();render()}});

  // Survey inputs
  document.querySelectorAll("[data-sv]").forEach(function(el){
    el.oninput=function(e){S.surveyData[el.dataset.sv]=e.target.value;saveState()};
  });

  // Generate report
  var gr=document.getElementById("genReport");if(gr)gr.onclick=generateReport;

  // Quiz
  var qs=document.getElementById("quizStart");
  if(qs)qs.onclick=function(){
    var ni=document.getElementById("quizNameIn");
    if(ni){S.quizName=(ni.value||"").trim();try{localStorage.setItem("ivrit_quiz_name",S.quizName)}catch(e){}}
    S.quizQuestions=generateQuiz();S.quizIdx=0;S.quizPick=null;S.quizScore=0;S.quizDone=false;S.quizRecorded=false;render();
  };
  document.querySelectorAll(".quiz-opt").forEach(function(b){b.onclick=function(){
    var qi=parseInt(b.dataset.qi);
    var q=S.quizQuestions[S.quizIdx];
    if(q.picked!==null)return;
    q.picked=qi;
    if(qi===q.correct)S.quizScore++;
    render();
  }});
  var qn=document.getElementById("quizNext");
  if(qn)qn.onclick=function(){
    if(S.quizIdx<S.quizQuestions.length-1){S.quizIdx++;render()}
    else{S.quizDone=true;render()}
  };
}

// ═══════════════ INIT ═══════════════
render();
</script>
</body>
</html>
